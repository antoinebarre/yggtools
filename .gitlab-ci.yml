variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .uv-cache/
    - .venv/

stages:
  - quality

.quality_base:
  stage: quality
  before_script:
    - pip install uv --quiet
    - uv sync
